<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
html, body { 
  margin: 0; padding: 0; width: 100%; height: 100%; 
  overflow: hidden; background: #000; 
  font-family: "Courier New", monospace; 
}

#matrixCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: #000;
}

#decryptStatus {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #00ff66;
  z-index: 100;
  font-size: 18px;
  letter-spacing: 2px;
  text-shadow: 0 0 12px currentColor;
}

#nodeCounter {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  color: #00ff66;
  font-size: 14px;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00ff66;
}

.crown-container { 
  position: fixed;
  top: 50%;
  left: 50%; 
  transform: translate(-50%, -50%); 
  z-index: 10;
  width: min(500px, 76vw);
  height: min(500px, 76vw);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 2s ease-in;
  pointer-events: none;
}

.crown-container.visible {
  opacity: 1;
}

.crown { 
  width: 100%;
  height: 100%;
  object-fit: contain; 
  filter:
    drop-shadow(0 0 24px rgba(255,215,0,0.8))
    drop-shadow(0 0 80px rgba(255,180,40,0.45));
  animation:
    crownPulse 3s ease-in-out infinite,
    crownRotate 20s linear infinite; 
}

@keyframes crownPulse {
  0%, 100% {
    transform: scale(1);
    filter:
      drop-shadow(0 0 24px rgba(255,215,0,0.8))
      drop-shadow(0 0 80px rgba(255,180,40,0.45));
  }
  50% {
    transform: scale(1.08);
    filter:
      drop-shadow(0 0 38px rgba(255,235,120,1))
      drop-shadow(0 0 110px rgba(255,180,40,0.75));
  }
}

@keyframes crownRotate {
  0% { rotate: 0deg; }
  25% { rotate: 1.5deg; }
  75% { rotate: -1.5deg; }
  100% { rotate: 0deg; }
}

.alert-flash {
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(circle at center,
    rgba(255,215,0,0.28) 0%,
    rgba(255,170,40,0.12) 35%,
    rgba(0,0,0,0) 100%);
}

.alert-flash.active {
  animation: alertFlash 0.7s ease-out 1;
}

@keyframes alertFlash {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<div id="decryptStatus">SYSTEM ACTIVE...</div>
<div id="nodeCounter">NODES: 0 / 5</div>

<canvas id="matrixCanvas"></canvas>
<div class="alert-flash" id="alertFlash"></div>

<div class="crown-container" id="crownContainer">
  <img
    src="https://raw.githubusercontent.com/allajermakova2-wq/caso-numero-5/main/KORONA/crown.png"
    alt="Crown"
    class="crown"
  >
</div>

<script>
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");
const decryptStatus = document.getElementById("decryptStatus");
const nodeCounter = document.getElementById("nodeCounter");
const crownContainer = document.getElementById("crownContainer");
const alertFlash = document.getElementById("alertFlash");

let visitedNodes = new Set();
let crownUnlocked = false;

const nodes = [
  { name: "EUROPE", flag: "🇪🇺", group: "europe", role: "Central Hub" },
  { name: "AMERICA", flag: "🇺🇸", group: "america", role: "Primary Core" },
  { name: "ASIA", flag: "🇯🇵", group: "asia", role: "Data Stream" },
  { name: "RUSSIA", flag: "🇷🇺", group: "russia", role: "Security Layer" },
  { name: "ATLANTIS", flag: "🔱", group: "atlantis", role: "Hidden Node" }
];

let activeNodeIndex = 0;
nodeCounter.textContent = `NODES: 0 / ${nodes.length}`;

// --- ЗВУК ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq, duration, type = "sine") {
  if (audioCtx.state === "suspended") audioCtx.resume();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNodeSwitch() {
  playBeep(900 + Math.random() * 400, 0.08, "sine");
}

function playCrown() {
  playBeep(1400, 0.2, "sine");
  setTimeout(() => playBeep(1800, 0.3, "sine"), 150);
}

function playRainSound() {
  if (Math.random() < 0.015) {
    playBeep(360 + Math.random() * 180, 0.025, "sine");
  }
}

// --- КОРОНА ---
function checkCrown() {
  if (visitedNodes.size >= nodes.length && !crownUnlocked) {
    crownUnlocked = true;
    activateCrown();
  }
}

function activateCrown() {
  crownContainer.classList.add("visible");
  decryptStatus.textContent = "👑 CORONA MANIFESTED";
  decryptStatus.style.color = "#ffd700";
  nodeCounter.style.color = "#ffd700";
  nodeCounter.style.textShadow = "0 0 14px #ffd700";

  playCrown();
  triggerFlash();
}

function triggerFlash() {
  alertFlash.classList.remove("active");
  void alertFlash.offsetWidth;
  alertFlash.classList.add("active");
}

// --- МАТРИЦА ---
const chars = "アァイィウヴエカキクケコ0123456789CORONAATLANTIS";
const fontSize = 16;
let columns = 0;
let drops = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array.from({ length: columns }, () => Math.random() * -100);
}

window.addEventListener("resize", resize);
resize();

function drawMatrix() {
  ctx.fillStyle = crownUnlocked ? "rgba(0,0,0,0.11)" : "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];

    ctx.fillStyle = crownUnlocked ? "#ffd700" : "#00ff66";
    ctx.shadowColor = crownUnlocked ? "#ffd700" : "#00ff66";
    ctx.shadowBlur = crownUnlocked ? 18 : 9;

    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }

  ctx.shadowBlur = 0;
  playRainSound();

  requestAnimationFrame(drawMatrix);
}

drawMatrix();

// --- ЦИКЛ УЗЛОВ ---
function cycleDecryptor() {
  if (crownUnlocked) return;

  const node = nodes[activeNodeIndex];

  visitedNodes.add(node.name);

  decryptStatus.textContent = `${node.flag} ${node.name} // ${node.role}`;
  nodeCounter.textContent = `NODES: ${visitedNodes.size} / ${nodes.length}`;

  playNodeSwitch();
  triggerFlash();
  checkCrown();

  activeNodeIndex = (activeNodeIndex + 1) % nodes.length;
}

setInterval(cycleDecryptor, 4000);

document.addEventListener("click", () => {
  if (audioCtx.state === "suspended") audioCtx.resume();
  cycleDecryptor();
});
</script>

</body>
</html>
