<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Courier New", monospace; }
#matrixCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; background: #000; }
.screen-flicker { position: fixed; inset: 0; background: rgba(255,255,255,0.02); opacity: 0.03; z-index: 1; pointer-events: none; animation: flicker 0.18s infinite; }
@keyframes flicker { 0% { opacity: 0.03; } 50% { opacity: 0.04; } 100% { opacity: 0.03; } }
.alert-flash { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; background: radial-gradient(circle at center, rgba(255,215,0,0.25) 0%, rgba(0,0,0,0) 100%); }
.alert-flash.active { animation: alertFlash 0.6s ease-out 1; }
@keyframes alertFlash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
.crown-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; }
.crown { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); animation: crownPulse 3s ease-in-out infinite, crownRotate 20s linear infinite; }
@keyframes crownPulse { 0%, 100% { transform: scale(1); brightness(1); } 50% { transform: scale(1.08); brightness(1.3); } }
@keyframes crownRotate { 0% { transform: rotate(0deg); } 25% { transform: rotate(1.5deg); } 75% { transform: rotate(-1.5deg); } 100% { transform: rotate(0deg); } }
.crown.glitching { animation: crownGlitch 0.15s steps(2, end) infinite; }
@keyframes crownGlitch { 0% { transform: translate(0); filter: hue-rotate(0deg); } 50% { transform: translate(5px, -3px); filter: hue-rotate(45deg); } 100% { transform: translate(0); } }
.crown-title { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); z-index: 20; color: #ffd700; font-size: 28px; font-weight: bold; letter-spacing: 8px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,215,0,0.9); }
.scanlines { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.01) 0px, rgba(0,0,0,0) 3px); opacity: 0.25; }
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="screen-flicker"></div>
<div class="alert-flash" id="alertFlash"></div>
<div class="scanlines"></div>
<div class="crown-container" id="crownContainer">
  <img src="https://raw.githubusercontent.com/allajermakova2-wq/caso-numero-5/main/KORONA/crown.png" alt="Crown" class="crown" id="crown">
</div>
<div class="crown-title">КОРОНА РОССИЙСКОЙ ДЕРЖАВЫ</div>

<script>
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
const chars = "アァイィウヴエカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
let columns = 0, drops = [];

function resize() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array.from({ length: columns }, () => Math.random() * -100);
}
resize();
window.addEventListener('resize', resize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    const isGold = Math.random() < 0.2;
    ctx.fillStyle = isGold ? '#ffd700' : '#00ff66';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
  requestAnimationFrame(drawMatrix);
}
drawMatrix();

function triggerFlash() {
  const flash = document.getElementById('alertFlash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 600);
}

setInterval(() => {
  if(Math.random() > 0.7) triggerFlash();
  const crown = document.getElementById('crown');
  crown.classList.add('glitching');
  setTimeout(() => crown.classList.remove('glitching'), 300);
}, 4000);

document.addEventListener('click', () => { triggerFlash(); });
</script>
</body>
</html>
