<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Imperial Crown — Team Faccine</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: "Courier New", monospace;
}

/* Matrix Canvas */
#matrixCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: #000;
}

/* Screen flicker */
.screen-flicker {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.02);
  opacity: 0.03;
  z-index: 1;
  pointer-events: none;
  animation: flicker 0.18s infinite;
}

@keyframes flicker {
  0% { opacity: 0.03; }
  25% { opacity: 0.01; }
  50% { opacity: 0.04; }
  75% { opacity: 0.02; }
  100% { opacity: 0.03; }
}

/* Alert flash */
.alert-flash {
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(circle at center,
    rgba(255,215,0,0.25) 0%,
    rgba(255,100,0,0.15) 30%,
    rgba(255,0,0,0.05) 60%,
    rgba(0,0,0,0) 100%);
}

.alert-flash.active {
  animation: alertFlash 0.6s ease-out 1;
}

@keyframes alertFlash {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Crown Container */
.crown-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 600px;
  height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Crown Image */
.crown {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: 
    drop-shadow(0 0 20px rgba(255,215,0,0.6))
    drop-shadow(0 0 40px rgba(255,140,0,0.4))
    drop-shadow(0 0 60px rgba(255,69,0,0.2));
  animation: 
    crownPulse 3s ease-in-out infinite,
    crownRotate 20s linear infinite,
    crownGlow 4s ease-in-out infinite;
}

@keyframes crownPulse {
  0%, 100% {
    transform: scale(1);
    filter: 
      drop-shadow(0 0 20px rgba(255,215,0,0.6))
      drop-shadow(0 0 40px rgba(255,140,0,0.4))
      drop-shadow(0 0 60px rgba(255,69,0,0.2))
      brightness(1);
  }
  50% {
    transform: scale(1.08);
    filter: 
      drop-shadow(0 0 35px rgba(255,215,0,0.9))
      drop-shadow(0 0 70px rgba(255,140,0,0.7))
      drop-shadow(0 0 105px rgba(255,69,0,0.5))
      brightness(1.3);
  }
}

@keyframes crownRotate {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(1.5deg) scale(1.02); }
  50% { transform: rotate(0deg) scale(1); }
  75% { transform: rotate(-1.5deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes crownGlow {
  0%, 100% {
    filter: 
      drop-shadow(0 0 20px rgba(255,215,0,0.6))
      drop-shadow(0 0 40px rgba(255,140,0,0.4))
      hue-rotate(0deg);
  }
  33% {
    filter: 
      drop-shadow(0 0 30px rgba(255,215,0,0.8))
      drop-shadow(0 0 60px rgba(255,140,0,0.6))
      hue-rotate(15deg);
  }
  66% {
    filter: 
      drop-shadow(0 0 25px rgba(255,215,0,0.7))
      drop-shadow(0 0 50px rgba(255,140,0,0.5))
      hue-rotate(-15deg);
  }
}

/* Glitch effect on crown */
.crown.glitching {
  animation: 
    crownGlitch 0.15s steps(2, end) infinite,
    crownPulse 3s ease-in-out infinite,
    crownRotate 20s linear infinite;
}

@keyframes crownGlitch {
  0% { 
    transform: translate(0) scale(1);
    filter: hue-rotate(0deg) brightness(1);
  }
  25% { 
    transform: translate(-5px, 3px) scale(1.05);
    filter: hue-rotate(45deg) brightness(1.4);
  }
  50% { 
    transform: translate(5px, -3px) scale(0.95);
    filter: hue-rotate(-45deg) brightness(0.8);
  }
  75% { 
    transform: translate(-3px, -5px) scale(1.02);
    filter: hue-rotate(30deg) brightness(1.2);
  }
  100% { 
    transform: translate(0) scale(1);
    filter: hue-rotate(0deg) brightness(1);
  }
}

/* Sparkles around crown */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 
    0 0 10px #ffd700,
    0 0 20px #ff8c00,
    0 0 30px #ff4500;
  animation: sparkleFloat 3s ease-in-out infinite;
  pointer-events: none;
}

@keyframes sparkleFloat {
  0%, 100% {
    opacity: 0;
    transform: translateY(0) scale(0);
  }
  50% {
    opacity: 1;
    transform: translateY(-100px) scale(1.5);
  }
}

/* Title */
.crown-title {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  color: #ffd700;
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 8px;
  text-transform: uppercase;
  text-shadow: 
    0 0 10px rgba(255,215,0,0.9),
    0 0 20px rgba(255,140,0,0.7),
    0 0 40px rgba(255,69,0,0.5);
  animation: titlePulse 4s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% {
    opacity: 0.9;
    text-shadow: 
      0 0 10px rgba(255,215,0,0.9),
      0 0 20px rgba(255,140,0,0.7),
      0 0 40px rgba(255,69,0,0.5);
  }
  50% {
    opacity: 1;
    text-shadow: 
      0 0 20px rgba(255,215,0,1),
      0 0 40px rgba(255,140,0,0.9),
      0 0 80px rgba(255,69,0,0.7);
  }
}

/* Scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.018) 0px,
    rgba(255,255,255,0.018) 1px,
    rgba(0,0,0,0) 3px,
    rgba(0,0,0,0) 6px
  );
  opacity: 0.25;
  mix-blend-mode: screen;
}

/* Noise */
.noise {
  position: fixed;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  background-image: 
    radial-gradient(rgba(255,255,255,0.045) 0.55px, transparent 0.7px);
  background-size: 7px 7px;
  opacity: 0.05;
  mix-blend-mode: screen;
  animation: noiseShift 0.18s steps(2, end) infinite;
}

@keyframes noiseShift {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(1px, -1px); }
  50%  { transform: translate(-1px, 1px); }
  75%  { transform: translate(1px, 1px); }
  100% { transform: translate(-1px, -1px); }
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 60;
  pointer-events: none;
  background: radial-gradient(circle at center,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0.4) 70%,
    rgba(0,0,0,0.9) 100%);
}

/* Energy rings */
.energy-ring {
  position: absolute;
  border: 2px solid rgba(255,215,0,0.3);
  border-radius: 50%;
  animation: energyExpand 3s ease-out infinite;
  pointer-events: none;
}

@keyframes energyExpand {
  0% {
    width: 400px;
    height: 400px;
    opacity: 0.8;
    border-color: rgba(255,215,0,0.6);
  }
  100% {
    width: 800px;
    height: 800px;
    opacity: 0;
    border-color: rgba(255,140,0,0.1);
  }
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<div class="screen-flicker"></div>
<div class="alert-flash" id="alertFlash"></div>
<div class="scanlines"></div>
<div class="noise"></div>
<div class="vignette"></div>

<div class="crown-container" id="crownContainer">
  <img src="crown.png" alt="Imperial Crown" class="crown" id="crown">
  <div class="energy-ring"></div>
  <div class="energy-ring" style="animation-delay: 1s"></div>
  <div class="energy-ring" style="animation-delay: 2s"></div>
</div>

<div class="crown-title">КОРОНА РОССИЙСКОЙ ДЕРЖАВЫ</div>

<script>
// === MATRIX RAIN ===
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
const chars = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
const fontSize = 16;
let columns = 0;
let drops = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array.from({ length: columns }, () => Math.floor(Math.random() * (canvas.height / fontSize)));
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    const isGold = Math.random() < 0.15;
    
    ctx.fillStyle = isGold ? '#ffd700' : '#00ff66';
    ctx.shadowColor = isGold ? '#ffd700' : '#00ff66';
    ctx.shadowBlur = 8;
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

// === SPARKLES ===
function createSparkles() {
  const container = document.getElementById('crownContainer');
  for (let i = 0; i < 20; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = Math.random() * 100 + '%';
    sparkle.style.top = Math.random() * 100 + '%';
    sparkle.style.animationDelay = Math.random() * 3 + 's';
    sparkle.style.animationDuration = (2 + Math.random() * 3) + 's';
    container.appendChild(sparkle);
  }
}

// === AUDIO ENGINE ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCrownSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playGlitchSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'square';
  osc.frequency.setValueAtTime(200 + Math.random() * 400, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

// === GLITCH EFFECTS ===
function triggerCrownGlitch() {
  const crown = document.getElementById('crown');
  crown.classList.add('glitching');
  playGlitchSound();
  
  setTimeout(() => {
    crown.classList.remove('glitching');
  }, 200 + Math.random() * 300);
}

function triggerFlash() {
  const flash = document.getElementById('alertFlash');
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');
  playCrownSound();
}

// === LOOPS ===
function loop() {
  drawMatrix();
  requestAnimationFrame(loop);
}

loop();

// === INTERVALS ===
setInterval(triggerCrownGlitch, 3000 + Math.random() * 4000);
setInterval(triggerFlash, 8000 + Math.random() * 6000);

// === CLICK INTERACTION ===
document.addEventListener('click', () => {
  triggerCrownGlitch();
  triggerFlash();
  playCrownSound();
});

// === INITIALIZE ===
createSparkles();
</script>

</body>
</html>
