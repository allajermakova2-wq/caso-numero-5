<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Indagini delle Faccine — Вход в Архив</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Courier New", Courier, monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .content-box {
      max-width: 620px;
      width: 100%;
      text-align: center;
      background: rgba(0, 0, 0, 0.88);
      border: 2px solid #00ff00;
      border-radius: 14px;
      padding: 38px 28px;
      box-shadow: 0 0 18px #00ff00, inset 0 0 18px rgba(0, 255, 0, 0.25);
    }

    h1 {
      margin: 0 0 22px;
      color: #00ff00;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 12px #00ff00;
    }

    p {
      margin: 0 0 28px;
      color: #ffffff;
      font-size: 16px;
      line-height: 1.5;
    }

    .access-btn {
      display: inline-block;
      padding: 16px 34px;
      color: #000;
      background: #00ff00;
      border: 2px solid #00ff00;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 0 16px #00ff00;
      transition: 0.25s ease;
    }

    .access-btn:hover {
      color: #00ff00;
      background: #000;
      box-shadow: 0 0 28px #00ff00;
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <main class="overlay">
    <section class="content-box">
      <h1>TEAM FACCINE — АРХИВ</h1>
      <p>Система готова. Доступ разрешен.</p>

      <a href="Database-investigativo-del-Team-Faccine.html" class="access-btn">
        [ ДОСТУП К МАТЕРИАЛАМ ]
      </a>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    const alphabet =
      "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    const fontSize = 16;
    let columns = 0;
    let rainDrops = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(canvas.width / fontSize);
      rainDrops = Array.from(
        { length: columns },
        () => Math.random() * canvas.height / fontSize
      );
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ff00";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet[Math.floor(Math.random() * alphabet.length)];
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          rainDrops[i] = 0;
        }

        rainDrops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(drawMatrix, 30);
  </script>
</body>
</html>
