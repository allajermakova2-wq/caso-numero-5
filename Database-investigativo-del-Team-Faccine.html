<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database investigativo del Team Faccine</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #00ff00;
      font-family: "Courier New", Courier, monospace;
      padding: 30px;
      box-sizing: border-box;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      border: 2px solid #00ff00;
      border-radius: 14px;
      padding: 28px;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 0 20px #00ff00;
    }

    h1 {
      text-align: center;
      text-shadow: 0 0 12px #00ff00;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 30px;
    }

    .card {
      border: 1px solid #00ff00;
      padding: 18px;
      border-radius: 10px;
      background: rgba(0, 255, 0, 0.06);
      box-shadow: inset 0 0 12px rgba(0, 255, 0, 0.2);
    }

    a {
      color: #00ff00;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-shadow: 0 0 10px #00ff00;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 20px;
      border: 1px solid #00ff00;
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>DATABASE INVESTIGATIVO DEL TEAM FACCINE</h1>

    <p>Архив открыт. Материалы доступны.</p>

    <section class="grid">
      <div class="card">
        <h2>Caso 1</h2>
        <p>Материалы расследования.</p>
      </div>

      <div class="card">
        <h2>Caso 2</h2>
        <p>Документы, изображения, заметки.</p>
      </div>

      <div class="card">
        <h2>Caso 3</h2>
        <p>Оперативный архив Team Faccine.</p>
      </div>

      <div class="card">
        <h2>Diario Operativo</h2>
        <p>Хронология и рабочие записи.</p>
      </div>
    </section>

    <a href="index.html" class="back">← Назад ко входу</a>
  </main>
</body>
</html>
